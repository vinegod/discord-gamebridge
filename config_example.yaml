# BOT settings
bot:
  token_env_var: "DISCORD_TOKEN"
  log_level: "info"

# Shared Server settings
x-shared:
  # Session name in tmux
  session: &session "terraria_server"

  admin_permissions: &admin_perms
    allowed_roles: ["YOUR_ADMIN_ROLE_ID"]
    allowed_users: ["YOUR_USER_ID"]

  terraria_paths: &server_args
    - *session
    - "/home/user/terraria_server/1456/Linux/terraria_server"
    - "/home/user/terraria_server/serverconfig.txt"
    - "/home/user/terraria_server/logs/server.log"

# Server settings
server:
  # Public channel for players
  discord_chat_channel_id: "12345678"

  # Max time to send message. If time exceeds - command cancels.
  chat_timeout: 5s
  discord_webhook_env: "DISCORD_WEBHOOK"

  # Optional log/audit channel. Lines with channel: log are routed here.
  # discord_console_channel_id: "98765432109876543"
  # discord_console_webhook_env: "DISCORD_LOG_WEBHOOK"

  # Log tailing for game -> discord
  log_file_path: "/home/user/terraria_server/logs/server.log"

  chat_template: "say {{.user}} {{.message}}"
  chat_executor: "tmux"

  # Log rules are evaluated in order; first match wins.
  # Template variables: {{.line}} = full line, {{.groupname}} = named regex group.
  # channel: chat (default) routes to discord_chat_channel_id.
  # channel: log routes to discord_console_channel_id (if configured).
  log_rules:
    # Drop server-generated chat so it doesn't echo back.
    - name: ignore_server
      regex: '^<Server> .*$'
      ignore: true

    # Player chat: <PlayerName> Hello world!
    - name: chat
      regex: '^<(?P<player>[^>]+)> (?P<message>.*)$'
      username: '{{.player}}'
      message: '{{.message}}'
      channel: chat

    # Player joined: PlayerName has joined.
    - name: join
      regex: '^(?P<player>[^\s]+) has joined\.$'
      username: Server
      message: '🟢 **{{.player}}** joined the server.'
      channel: chat

    # Player left: PlayerName has left.
    - name: leave
      regex: '^(?P<player>[^\s]+) has left\.$'
      username: Server
      message: '🔴 **{{.player}}** left the server.'
      channel: chat

    # Game events: boss spawns, invasions, etc.
    - name: events
      regex: '.*(has awoken!|have been defeated!|is approaching!|is rising\.\.\.|falling from the sky!)$'
      username: System
      message: '{{.line}}'
      channel: chat

    # Server console output -> log/audit channel.
    - name: console
      regex: '^(Terraria Server v|Listening on port|World saved).*'
      username: System
      message: '{{.line}}'
      channel: log

executors:
  tmux:
    type: "tmux"
    session: *session
    window: 1
    pane: 1

  script:
    type: "script"
    allowed_script_dir: "/home/user/terraria_server/scripts"

  #SSH executor — runs commands on a remote host.
  #All sensitive values (user, key path, known_hosts path) come from .env,
  #not from this file. The env var values are file paths, not file contents.
  remote:
    type: "ssh"
    host: "gameserver.example.com"
    port: 22                          # optional, defaults to 22
    user_env: "SSH_USER"              # .env: SSH_USER=gameadmin
    key_env: "SSH_KEY_FILE"           # .env: SSH_KEY_FILE=/secrets/id_ed25519
    known_hosts_env: "SSH_KNOWN_HOSTS_FILE" # .env: SSH_KNOWN_HOSTS_FILE=/secrets/known_hosts

# Command registry
commands:
  - name: "kick"
    description: "Kicks a player from the Terraria server"
    executor: "tmux"
    script_timeout: 10s
    cooldown: 10s   # optional: each user must wait 10s between kicks
    template: "kick {{.player}} {{.reason}}"
    permissions: *admin_perms
    arguments:
      - name: "player"
        type: "string"
        description: "Exact in-game name"
        required: true
      - name: "reason"
        type: "string"
        description: "Reason for kick"
        required: false

  # Start server
  - name: "start"
    description: "Boots the Terraria server"
    executor: "script"
    target_bridge: "terraria_main"
    script_path: "start.sh"
    script_timeout: 25s
    permissions: *admin_perms
    static_args: *server_args

  # Stop server
  - name: "stop"
    description: "Safely saves and stops the Terraria server"
    executor: "script"
    script_path: "stop.sh"
    script_timeout: 65s
    permissions: *admin_perms
    static_args:
      - *session

  # Restart server
  - name: "restart"
    description: "Safely restarts the Terraria server"
    executor: "script"
    script_path: "restart.sh"
    script_timeout: 75s
    permissions: *admin_perms
    static_args: *server_args
    # Example of output config
    output:
      pattern: 'Restart sequence (?P<complete>\S+)'
      format: "Server restart {{.complete}}"

  - name: "reload"
    description: "Hot-reloads the bot configuration"
    type: "internal"
    permissions:
      allowed_users: ["YOUR_ADMIN_ID"]

  - name: "ping"
    description: "Check bot latency"
    type: "internal"
    permissions:
      allowed_roles: ["@everyone"]

  - name: "version"
    description: "Check bot versiob"
    type: "internal"
    permissions:
      allowed_roles: ["@everyone"]

# Scheduled jobs — fired on a cron expression, independent of Discord commands.
# Missed firings on bot restart are not replayed.
schedules:
  - name: "auto_save"
    cron: "*/10 * * * *"   # every 10 minutes
    executor: "tmux"
    command: "save"
    skip_if_down: true      # silently skip if tmux session is gone

  - name: "daily_backup"
    cron: "0 3 * * *"      # 3am every day
    executor: "scripts"
    command: "backup.sh"
    timeout: 120s
    # skip_if_down omitted — script executor has no health check, always runs
