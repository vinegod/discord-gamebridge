version: 2

before:
  hooks:
    - go mod tidy

project_name: discord-gamebridge
builds:
  - id: gamebridge-linux
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - linux
    goarch:
      - amd64
      - arm64

  - id: gamebridge-windows
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - windows
    goarch:
      - amd64

archives:
  - formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
