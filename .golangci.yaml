version: "2"

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters-settings:
  gocyclo:
    min-complexity: 15

  gocognit:
    min-complexity: 20

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style

  gosec:
    severity: medium
    confidence: medium

  goimports:
    local-prefixes: github.com/vinegod/discordgamebridge

  nolintlint:
    require-explanation: true
    require-specific: true

  revive:
    rules:
      - name: exported
        disabled: true
      - name: package-comments
        disabled: true

  wrapcheck:
    ignoreSigs:
      - .Errorf(
      - errors.New(
      - errors.Join(
      - errors.Unwrap(

  errorlint:
    errorf: true
    asserts: true
    comparison: true

  godot:
    scope: declarations
    capital: false

  contextcheck:
    disable-exported-types-check: false

linters:
  disable-all: true
  enable:
    # Default / Standard
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Error handling
    - wrapcheck
    - errorlint
    - nilerr

    # Security
    - gosec
    - bidichk

    # Formatting & Style
    - misspell
    - whitespace
    - nolintlint
    - godot

    # Complexity & Design
    - gocyclo
    - gocritic
    - nakedret
    - exhaustive
    - nestif
    - unparam
    - reassign

    # Context
    - contextcheck

    # Performance
    - prealloc
    - gocognit

formatterts:
  enable:
    - gofumpt

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
